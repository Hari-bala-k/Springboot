<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Registration System</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
        }

        h2 {
            color: white;
            margin-bottom: 30px;
        }

        .container {
            display: flex;
            gap: 20px;
        }

        a button {
            padding: 12px 25px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background-color: white;
            color: #333;
            transition: 0.3s;
        }

        a button:hover {
            background-color: #333;
            color: white;
            transform: scale(1.05);
        }
    </style>
</head>

<body>

    <h2>Course Registration</h2>

    <div class="container">
        <a href="Registration.html"><button>Registration</button></a>
        <a href="Courses.html"><button>Courses</button></a> 
        <a href="Enroll.html"><button>Enroll</button></a> 
    </div>

</body>
</html>
